<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>To The Moon — Artists</title>

  <!-- Favicon and base styles -->
  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Main JS for artists page -->
  <script src="artists.js" defer></script>
</head>
<body class="artists-page">

  <!-- Encabezado dinámico (brandbar + burger menu) -->
  <header class="site-header" role="banner">
    <div class="brandbar">
      <div class="brandbar-inner container">
        <!-- Logo principal -->
        <a href="index.html" class="brand" aria-label="To The Moon Management — Inicio">
          <picture>
            <source srcset="assets/logo.svg" type="image/svg+xml">
            <img src="assets/logo.svg" alt="To The Moon Management" width="320" height="76" loading="eager" decoding="async">
          </picture>
          <span class="brand-sub"></span>
        </a>
        <!-- Botón de menú hamburguesa -->
        <button class="nav-toggle" aria-expanded="false" aria-controls="mainNav" aria-label="Abrir menú">
          <span class="bar" aria-hidden="true"></span>
          <span class="bar" aria-hidden="true"></span>
          <span class="bar" aria-hidden="true"></span>
        </button>
      </div>
    </div>
    <nav id="mainNav" class="tabsbar" aria-label="Navegación principal">
      <div class="tabsbar-inner container">
        <ul class="nav-tabs" role="menubar">
          <li role="none"><a role="menuitem" href="index.html">Home</a></li>
          <li role="none"><a role="menuitem" href="artists.html" aria-current="page">Artists</a></li>
          <li role="none"><a role="menuitem" href="services.html">Services</a></li>
          <li role="none"><a role="menuitem" href="team.html">Team</a></li>
          <li role="none"><button id="openContact" class="nav-contact-btn" type="button">Contact</button></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- Subtle moving overlay on top of static dark blue background -->
  <div class="bg-anim" aria-hidden="true"></div>

  <!-- Labels marquee with darker background and fade edges -->
  <section class="labels-marquee" aria-hidden="false">
    <div class="labels-clip">
      <div class="labels-track" aria-hidden="true">
        <!-- first sequence of logos (loop will occur via CSS animation) -->
        <img src="assets/labels/3RDAVENUE.svg" alt="3rd Avenue" loading="lazy" />
        <img src="assets/labels/AHDIGITAL.svg" alt="AH Digital" loading="lazy" />
        <img src="assets/labels/CIRCLEOFLIFE.png" alt="Circle of Life" loading="lazy" />
        <img src="assets/labels/LAFORESTA.svg" alt="La Foresta" loading="lazy" />
        <img src="assets/labels/MUSIQUEDELUNE.svg" alt="Musique de Lune" loading="lazy" />
        <img src="assets/labels/SOUNDAVENUE.png" alt="Sound Avenue" loading="lazy" />
        <img src="assets/labels/THEMANGOALLEY.png" alt="The Mango Alley" loading="lazy" />
        <!-- repeat second sequence for seamless loop -->
        <img src="assets/labels/3RDAVENUE.svg" alt="3rd Avenue" loading="lazy" />
        <img src="assets/labels/AHDIGITAL.svg" alt="AH Digital" loading="lazy" />
        <img src="assets/labels/CIRCLEOFLIFE.png" alt="Circle of Life" loading="lazy" />
        <img src="assets/labels/LAFORESTA.svg" alt="La Foresta" loading="lazy" />
        <img src="assets/labels/MUSIQUEDELUNE.svg" alt="Musique de Lune" loading="lazy" />
        <img src="assets/labels/SOUNDAVENUE.png" alt="Sound Avenue" loading="lazy" />
        <img src="assets/labels/THEMANGOALLEY.png" alt="The Mango Alley" loading="lazy" />
      </div>
    </div>
  </section>

  <!-- Main content: artists grid -->
  <main class="container page-content">
    <section class="artists-section">
      <h1 class="section-title">Artistas</h1>
      <div id="artistsGrid" class="artists-grid" aria-live="polite"></div>
    </section>
  </main>

  <!-- Modal for artist details -->
  <div id="artistModal" class="modal artist-modal" hidden aria-hidden="true" aria-labelledby="artistTitle" role="dialog">
    <div class="modal-wrapper">
      <button class="modal-close" aria-label="Cerrar artista">×</button>
      <div id="artistModalContent" class="artist-modal-content" tabindex="0"><!-- Filled by JS --></div>
    </div>
  </div>

  <!-- Modal de contacto con overlay y formulario dinámico -->
  <div class="contact-modal" id="contactModal" hidden>
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="close-modal" id="closeForm" aria-label="Cerrar formulario">&times;</button>
      <h2>Contacto</h2>
      <form id="contactForm" action="#" method="POST">
        <input type="text" name="name" id="cf_name" placeholder="Nombre" required />

        <select name="subject" id="cf_subject" required>
          <option value="" disabled selected>Seleccioná el motivo</option>
          <option value="Services">Services</option>
          <option value="Booking">Booking</option>
          <option value="General Inquiry">General Inquiry</option>
        </select>

        <div id="artistSelectContainer" hidden>
          <select name="artist" id="cf_artist">
            <option value="" disabled selected>Elegí un artista</option>
            <option value="Servando">Servando</option>
            <option value="Luciano Bedini">Luciano Bedini</option>
            <option value="Manu Pavez">Manu Pavez</option>
            <option value="Fideksen">Fideksen</option>
            <option value="Kentavros">Kentavros</option>
            <option value="P37RO">P37RO</option>
          </select>
        </div>

        <textarea name="message" id="cf_message" rows="6" required placeholder="Hola TTM! Me contacto por:"></textarea>

        <button type="submit" id="cf_send" class="btn-primary">Enviar</button>
      </form>
    </div>
  </div>
  <!-- Toast de confirmación de contacto -->
  <div class="toast" id="toast" hidden>¡Gracias por contactarte con To The Moon! Te responderemos pronto.</div>

  <!-- Footer unificado (coincide con otras páginas) -->
  <footer class="site-footer">
    <div class="container footer-grid">
      <p>© 2025 To The Moon Management</p>
      <div class="social">
        <a href="https://www.instagram.com/tothemoonmanagement" target="_blank" class="soc ig" aria-label="Instagram">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7m10 2c1.6 0 3 1.4 3 3v10c0 1.6-1.4 3-3 3H7c-1.6 0-3-1.4-3-3V7c0-1.6 1.4-3 3-3h10M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10m0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
        </a>
        <button class="soc mail" id="openForm" aria-label="Email">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 13.5 2 6.75V18h20V6.75L12 13.5Z"/></svg>
        </button>
      </div>
    </div>
  </footer>

</body>
</html>
